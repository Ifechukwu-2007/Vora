<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vora Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #chatBox::-webkit-scrollbar {
      width: 5px;
    }

    #chatBox::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    #chatBox {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col">

  <!-- ================= HEADER ================= -->
  <header class="bg-blue-600 text-white p-4 shadow-md flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold">Vora Chat</h1>
      <p class="text-sm opacity-80">Customer & Provider Messaging</p>
    </div>
    <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold transition">
      Logout
    </button>
  </header>

  <!-- ================= CHAT CONTEXT ================= -->
  <div id="chat-context-header" class="bg-white border-b border-gray-200 p-4 z-10">
    <div class="max-w-5xl mx-auto">
      <button id="backBtn" type="button" onclick="window.history.back()"
        class="text-blue-600 hover:text-blue-800 font-semibold mb-3 inline-block">
        ← Back
      </button>
      <h2 id="service-title" class="text-lg font-bold text-gray-800">Loading...</h2>
      <p id="other-user-name" class="text-sm text-gray-500 mt-1"></p>
    </div>
  </div>

  <!-- ================= CHAT AREA ================= -->
  <div
    id="chatBox"
    class="flex-1 overflow-y-auto p-4 max-w-5xl mx-auto w-full"
  ></div>

  <!-- ================= INPUT AREA ================= -->
  <div class="bg-white border-t border-gray-200 p-4 shadow-lg">
    <div class="max-w-5xl mx-auto flex gap-3">
      <input
        type="text"
        id="messageInput"
        placeholder="Type a message..."
        class="flex-1 border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />

      <button
        id="sendBtn"
        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        Send
      </button>
    </div>
  </div>

  <!-- ================= SCRIPTS ================= -->
  <script src="./supabase.js" type="module"></script>
  <script src="./auth.js" type="module"></script>
  <script src="./chat.js" type="module"></script>
  <script src="./notifications.js" type="module"></script>
  <script src="./notification-service.js" type="module"></script>
  <script src="./notification-badge.js" type="module"></script>

</body>
</html>
